<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Neko — Roles</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="nnfavicon.ico">
<style>
  /* make the container wrap and center its children */
  .container {
    display: flex;
    flex-wrap: wrap;            /* allow multiple rows */
    justify-content: center;     /* center cards in each row */
    gap: 1rem;                   /* space between cards */
    margin-top: 1rem;
  }

  /* set a fixed width for role cards */
  .card {
    flex: 0 0 calc(25% - 1rem);  /* 4 cards per row on large screens */
    max-width: 220px;            /* cap their width */
    position: relative;
    opacity: 0.9;
    transition: opacity 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
  }

  .card:hover {
    opacity: 1;
  }

  .card__inner {
    width: 100%;
    height: 250px;             /* set a fixed height for images */
    overflow: hidden;
    border-radius: 8px;
    border: 2px solid #FF4ECD;
    box-shadow: 0 0 10px #FF4ECD66;
  }

  .card picture, .card picture img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  .card__info {
    text-align: center;
    color: #fff;
    padding: 0.5rem 0;
  }
</style>

</head>
<body>
  <!-- navigation and timer (same as staff) -->
  <div class="nav-wrapper">
    <nav id="main-nav">
      <a href="index.html#home">Home</a>
      <a href="info.html">Venue Details</a>
      <a href="roles.html" class="active">Team & Services</a>
      <a href="index.html#menu">Menu</a>
      <a href="/vip/vip.html">💎 VIP Packages</a>
      <a href="index.html#apply">Apply Now!</a>
    </nav>
  </div>
  <div class="open-timer-inline">
    <span class="timer-label">🕘 OPEN EVERY SATURDAY AT 10PM EST</span>
    <span class="divider">·</span>
    <span class="opening-text">Opening in</span>
    <span class="countdown-part"><span id="days">--</span>d</span>
    <span class="countdown-part"><span id="hours">--</span>h</span>
    <span class="countdown-part"><span id="minutes">--</span>m</span>
    <span class="countdown-part"><span id="seconds">--</span>s</span>
  </div>

  <div class="container"></div>

  <script>
    function activateHoverEffects() {
      const cards = document.querySelectorAll('.card');
      cards.forEach(card => card.classList.add('is-active'));
      cards.forEach(card => {
        card.addEventListener('mouseenter', () => {
          cards.forEach(c => c.classList.remove('is-active'));
          card.classList.add('is-active');
        });
        card.addEventListener('mouseleave', () => {
          cards.forEach(c => c.classList.add('is-active'));
        });
      });
    }

    // Make sure the path to staff.json is correct relative to this file.
    fetch('./staff.json')
      .then(res => res.json())
      .then(staffList => {
        const container = document.querySelector('.container');
        const rolesMap = {};
        staffList.forEach(staff => {
          rolesMap[staff.role] ??= [];
          rolesMap[staff.role].push(staff);
        });

        // Build a card for each role
        Object.entries(rolesMap).forEach(([role, members]) => {
          const card = document.createElement('div');
          card.className = 'card';

          const inner = document.createElement('div');
          inner.className = 'card__inner';
          const picture = document.createElement('picture');
          const img = document.createElement('img');
          const firstImg = members[0].image;
          img.src = Array.isArray(firstImg) ? firstImg[0] : firstImg;
          img.alt = role;
          picture.appendChild(img);
          inner.appendChild(picture);

          const info = document.createElement('div');
          info.className = 'card__info';
          info.innerHTML = `<h3>${role}</h3>`;
          card.appendChild(inner);
          card.appendChild(info);

          // Navigate to staff.html with role filter
          card.addEventListener('click', () => {
            window.location.href = 'staff.html?role=' + encodeURIComponent(role);
          });

          container.appendChild(card);
        });

        // Make sure the container becomes visible after cards are added
        container.style.visibility = 'visible';
        activateHoverEffects();
      })
      .catch(err => {
        console.error("Couldn't load staff.json:", err);
        // Still show the container if there was an error
        document.querySelector('.container').style.visibility = 'visible';
      });
  </script>

  <!-- neon cursor and timer scripts remain unchanged -->
  <canvas id="neonCanvas" style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;"></canvas>
  <style> body, html { cursor: none !important; } </style>
  <script>
    // neon cursor effect ...
  </script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  <script src="src/ny-time.js"></script>
  <script>
    function updateCountdown() {
      const parts = NYTimeUtils.getCountdownParts();
      document.getElementById("days").textContent = String(parts.days).padStart(2, '0');
      document.getElementById("hours").textContent = String(parts.hours).padStart(2, '0');
      document.getElementById("minutes").textContent = String(parts.minutes).padStart(2, '0');
      document.getElementById("seconds").textContent = String(parts.seconds).padStart(2, '0');
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
